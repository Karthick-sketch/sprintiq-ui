<!-- Overlay -->
<div
  class="overlay"
  [class.initialized]="initialized"
  [class.visible]="isSlideInPanelOpen"
  [class.hidden-overlay]="!isSlideInPanelOpen"
  (click)="closeSlideInPanel()"
></div>

<!-- Slide-in Panel -->
<div
  class="slide-panel"
  [class.initialized]="initialized"
  [class.open]="isSlideInPanelOpen"
  [class.closed]="!isSlideInPanelOpen"
>
  <!-- Header -->
  <div class="panel-header">
    <div class="panel-header-left">
      <div class="panel-header-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <h2 class="panel-title">
        {{ isEditMode ? "Edit User" : "Create New User" }}
      </h2>
    </div>
    <button
      class="panel-close-btn"
      (click)="closeSlideInPanel()"
      aria-label="Close panel"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="panel-body">
    <!-- Full Name -->
    <div class="form-group">
      <label class="form-label" for="user-name">Full Name</label>
      <input
        id="user-name"
        type="text"
        class="form-input"
        placeholder="Enter full name"
        [(ngModel)]="formUser.name"
      />
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="user-email">Email Address</label>
      <input
        id="user-email"
        type="email"
        class="form-input"
        placeholder="Enter email address"
        [(ngModel)]="formUser.email"
      />
    </div>

    <!-- Role -->
    <div class="form-group">
      <label class="form-label" for="user-role">Role</label>
      <select id="user-role" class="form-input" [(ngModel)]="formUser.role">
        <option value="">Select Role</option>
        @for (role of roles; track role) {
          <option [value]="role">{{ roleLabels[role] }}</option>
        }
      </select>
    </div>

    <!-- Active Status -->
    <div class="form-group">
      <label class="form-label">Status</label>
      <div class="toggle-row">
        <span class="toggle-label">{{
          formUser.active ? "Active" : "Inactive"
        }}</span>
        <label class="toggle-switch" aria-label="Toggle active status">
          <input type="checkbox" [(ngModel)]="formUser.active" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="panel-footer">
    <button class="btn-cancel" (click)="closeSlideInPanel()">Cancel</button>
    <button class="btn-submit primary-btn" (click)="submit()">
      {{ isEditMode ? "Save Changes" : "Create User" }}
    </button>
  </div>
</div>
