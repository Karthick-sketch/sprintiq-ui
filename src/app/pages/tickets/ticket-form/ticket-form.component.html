<!-- Overlay -->
<div
  class="fixed inset-0 z-40"
  [class.transition-opacity]="initialized"
  [class.duration-300]="initialized"
  [class.ease-in-out]="initialized"
  [class.opacity-100]="isSlideInPanelOpen"
  [class.pointer-events-auto]="isSlideInPanelOpen"
  [class.opacity-0]="!isSlideInPanelOpen"
  [class.pointer-events-none]="!isSlideInPanelOpen"
  [style.background-color]="'rgba(0, 0, 0, 0.4)'"
  (click)="closeSlideInPanel()"
></div>

<!-- Slide-in Panel -->
<div
  class="fixed inset-y-0 right-0 z-50 w-96 bg-white shadow-xl transform flex flex-col"
  [class.transition-transform]="initialized"
  [class.duration-300]="initialized"
  [class.ease-in-out]="initialized"
  [class.translate-x-0]="isSlideInPanelOpen"
  [class.translate-x-full]="!isSlideInPanelOpen"
>
  <!-- Header -->
  <div class="flex items-center justify-between p-4 border-b">
    <h2 class="text-xl font-semibold">Create New Ticket</h2>
    <button
      (click)="closeSlideInPanel()"
      class="text-gray-500 hover:text-gray-700"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto p-4 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
      <input
        type="text"
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="Enter ticket title"
        [(ngModel)]="ticket.title"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Description
      </label>
      <textarea
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        rows="4"
        placeholder="Enter ticket description"
        [(ngModel)]="ticket.description"
      ></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
      <select
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        [(ngModel)]="ticket.status"
      >
        @for (status of ticketStatus; track $index) {
          <option [value]="status.value">{{ status.key }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Priority
      </label>
      <select
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        [(ngModel)]="ticket.priority"
      >
        @for (priority of ticketPriority; track $index) {
          <option [value]="priority.value">{{ priority.key }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Assignee
      </label>
      <select
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        [(ngModel)]="ticket.assigneeId"
      >
        <option value="0">Select Assignee</option>
        @for (user of users; track $index) {
          <option [value]="user.id">{{ user.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Due Date
      </label>
      <input
        type="date"
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        [(ngModel)]="ticket.dueDate"
      />
    </div>

    @if (isInProject) {
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Project
        </label>
        <select
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          [(ngModel)]="ticket.projectId"
        >
          <option value="">Select Project</option>
          @for (project of projects; track $index) {
            <option [value]="project.id">{{ project.name }}</option>
          }
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Section
        </label>
        <select
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          [(ngModel)]="ticket.sectionId"
        >
          <option value="">Select Section</option>
          @for (section of sections; track $index) {
            <option [value]="section.id">{{ section.name }}</option>
          }
        </select>
      </div>
    }
  </div>

  <!-- Footer -->
  <div class="p-4 border-t flex justify-end space-x-3">
    <button
      (click)="closeSlideInPanel()"
      class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none"
    >
      Cancel
    </button>
    <button class="primary-btn" (click)="addTicket()">Create</button>
  </div>
</div>
