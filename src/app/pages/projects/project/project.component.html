@if (project) {
  <div class="project-header">
    <h1 class="project-title">{{ project.name }}</h1>
    <p class="project-description">
      {{ project.description }}
    </p>
  </div>
  <div>
    <app-kanban-board
      [projectId]="project.id"
      [users]="users"
    ></app-kanban-board>
  </div>
}
