@if (project) {
  <div class="mb-4">
    <app-breadcrumb [breadcrumbRoutes]="breadcrumbRoutes"></app-breadcrumb>
  </div>
  <div class="project-header">
    <h1 class="project-title">{{ project.name }}</h1>
    <p class="project-description">
      {{ project.description }}
    </p>
  </div>
  <div>
    <app-kanban-board [project]="project" [users]="users"></app-kanban-board>
  </div>
}
