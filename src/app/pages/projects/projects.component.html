<section>
  <div class="p-4">
    <h1 class="text-3xl font-bold">Projects</h1>
    <p>
      Manage your kinetic work and track real-time progress across all your
      active studio initiatives.
    </p>

    <div class="mt-4">
      <button class="primary-btn" (click)="openProjectSlideInPanel()">
        Create Project
      </button>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-4">
    @for (project of projects; track project.id) {
      <app-project-card [project]="project"></app-project-card>
    }
  </div>

  <app-project-form
    [isSlideInPanelOpen]="isSlideInPanelOpen"
    (projectSlideInPanel)="closeProjectSlideInPanel()"
    (project)="createProject($event)"
  ></app-project-form>
</section>
