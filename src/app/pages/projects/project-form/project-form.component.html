<div>
  <!-- Overlay -->
  <div
    class="fixed inset-0 z-40"
    [class.transition-opacity]="initialized"
    [class.duration-300]="initialized"
    [class.ease-in-out]="initialized"
    [class.opacity-100]="isSlideInPanelOpen"
    [class.pointer-events-auto]="isSlideInPanelOpen"
    [class.opacity-0]="!isSlideInPanelOpen"
    [class.pointer-events-none]="!isSlideInPanelOpen"
    [style.background-color]="'rgba(0, 0, 0, 0.4)'"
    (click)="closeSlideInPanel()"
  ></div>

  <!-- Slide-in Panel -->
  <div
    class="fixed inset-y-0 right-0 z-50 w-96 bg-white shadow-xl transform flex flex-col"
    [class.transition-transform]="initialized"
    [class.duration-300]="initialized"
    [class.ease-in-out]="initialized"
    [class.translate-x-0]="isSlideInPanelOpen"
    [class.translate-x-full]="!isSlideInPanelOpen"
  >
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b">
      <h2 class="text-xl font-semibold">Create New Project</h2>
      <button
        (click)="closeSlideInPanel()"
        class="text-gray-500 hover:text-gray-700"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Project Name
        </label>
        <input
          type="text"
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Enter project name"
          [(ngModel)]="newProject.name"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Description
        </label>
        <textarea
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          rows="4"
          placeholder="Enter project description"
          [(ngModel)]="newProject.description"
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Owner</label
        >
        <input
          type="text"
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Select owner"
          [(ngModel)]="newProject.ownerId"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Team Members
        </label>
        <input
          type="text"
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Add team members"
          [(ngModel)]="newProject.teamMemberIds"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="p-4 border-t flex justify-end space-x-3">
      <button
        (click)="closeSlideInPanel()"
        class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none"
      >
        Cancel
      </button>
      <button
        class="px-4 py-2 primary-btn text-white rounded-md hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        (click)="sendProject()"
      >
        Create
      </button>
    </div>
  </div>
</div>
