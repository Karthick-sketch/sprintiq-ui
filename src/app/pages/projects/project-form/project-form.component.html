<div>
  <!-- Overlay -->
  <div
    class="fixed inset-0 z-40"
    [class.transition-opacity]="initialized"
    [class.duration-300]="initialized"
    [class.ease-in-out]="initialized"
    [class.opacity-100]="isSlideInPanelOpen"
    [class.pointer-events-auto]="isSlideInPanelOpen"
    [class.opacity-0]="!isSlideInPanelOpen"
    [class.pointer-events-none]="!isSlideInPanelOpen"
    [style.background-color]="'rgba(0, 0, 0, 0.4)'"
    (click)="closeSlideInPanel()"
  ></div>

  <!-- Slide-in Panel -->
  <div
    class="fixed inset-y-0 right-0 z-50 w-96 bg-white shadow-xl transform flex flex-col"
    [class.transition-transform]="initialized"
    [class.duration-300]="initialized"
    [class.ease-in-out]="initialized"
    [class.translate-x-0]="isSlideInPanelOpen"
    [class.translate-x-full]="!isSlideInPanelOpen"
  >
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b">
      <h2 class="text-xl font-semibold">Create New Project</h2>
      <button
        (click)="closeSlideInPanel()"
        class="text-gray-500 hover:text-gray-700"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Project Name
        </label>
        <input
          type="text"
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          placeholder="Enter project name"
          [(ngModel)]="newProject.name"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Description
        </label>
        <textarea
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          rows="4"
          placeholder="Enter project description"
          [(ngModel)]="newProject.description"
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Owner
        </label>
        <select
          class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          [(ngModel)]="newProject.ownerId"
        >
          <option [value]="null">Select Owner</option>
          @for (user of users; track $index) {
            <option [value]="user.id">{{ user.name }}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Team Members
        </label>
        <!-- Custom Multi-Select Dropdown -->
        <div
          class="relative"
          (clickOutside)="teamDropdownOpen = false"
          appClickOutside
        >
          <!-- Trigger -->
          <div
            class="w-full min-h-[42px] border border-gray-300 rounded-md px-2 py-1 text-black cursor-pointer flex flex-wrap gap-1 items-center focus-within:ring-2 focus-within:ring-indigo-500 focus-within:border-indigo-500"
            (click)="teamDropdownOpen = !teamDropdownOpen"
          >
            @if (selectedTeamMembers().length === 0) {
              <span class="text-gray-400 text-sm py-1"
                >Select Team Members</span
              >
            }
            @for (member of selectedTeamMembers(); track member.id) {
              <span
                class="inline-flex items-center gap-1 bg-indigo-100 text-indigo-800 text-xs font-medium px-2 py-1 rounded-full"
              >
                {{ member.name }}
                <button
                  type="button"
                  class="hover:text-indigo-600 leading-none"
                  (click)="removeTeamMember($event, member.id)"
                >
                  &#x2715;
                </button>
              </span>
            }
            <!-- Chevron -->
            <svg
              class="ml-auto h-4 w-4 text-gray-400 shrink-0 transition-transform duration-200"
              [class.rotate-180]="teamDropdownOpen"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                clip-rule="evenodd"
              />
            </svg>
          </div>

          <!-- Dropdown List -->
          @if (teamDropdownOpen) {
            <div
              class="absolute z-10 mt-1 w-full bg-white border border-gray-200 rounded-md shadow-lg max-h-48 overflow-y-auto"
            >
              @for (user of users; track user.id) {
                <label
                  class="flex items-center gap-2 px-3 py-2 hover:bg-indigo-50 cursor-pointer text-sm text-gray-800"
                >
                  <input
                    type="checkbox"
                    class="accent-indigo-600"
                    [checked]="isTeamMemberSelected(user.id)"
                    (change)="toggleTeamMember(user.id)"
                  />
                  {{ user.name }}
                </label>
              }
              @if (users.length === 0) {
                <p class="px-3 py-2 text-sm text-gray-400">
                  No users available
                </p>
              }
            </div>
          }
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="p-4 border-t flex justify-end space-x-3">
      <button
        (click)="closeSlideInPanel()"
        class="cursor-pointer px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none"
      >
        Cancel
      </button>
      <button class="primary-btn" (click)="sendProject()">Create</button>
    </div>
  </div>
</div>
