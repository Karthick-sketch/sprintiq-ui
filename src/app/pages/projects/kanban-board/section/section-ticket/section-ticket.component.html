@if (ticket) {
  <div
    class="ticket-card"
    [routerLink]="['/projects', project.id, 'tickets', ticket.id]"
  >
    <div class="ticket-top">
      <span class="ticket-title">{{ ticket.title }}</span>
      @if (priority) {
        <span
          class="ticket-priority"
          [class]="'priority-' + priority.toLowerCase()"
        >
          {{ getPriorityLabel(priority) }}
        </span>
      }
    </div>

    <div class="ticket-meta">
      @if (status) {
        <span
          class="ticket-status"
          [class]="'status-' + status.toLowerCase().replace(' ', '_')"
        >
          {{ getStatusLabel(status) }}
        </span>
      }

      <div class="ticket-meta-right">
        @if (dueDate) {
          <span class="ticket-due">{{ dueDate | date: "MMM d" }}</span>
        }

        @if (assignee) {
          <span class="ticket-assignee">
            <app-user-icon
              [userName]="assignee"
              size="small"
            ></app-user-icon>
          </span>
        }
      </div>
    </div>
  </div>
}
