@if (ticket) {
  <div
    class="ticket-card"
    [routerLink]="['/projects', project.id, 'tickets', ticket.id]"
  >
    <div class="ticket-top">
      <span class="ticket-title">{{ ticket.title }}</span>
      <span
        class="ticket-priority"
        [class]="'priority-' + ticket.priority.toLowerCase()"
      >
        {{ getPriority(ticket.priority) }}
      </span>
    </div>

    <div class="ticket-meta">
      <span
        class="ticket-status"
        [class]="'status-' + ticket.status.toLowerCase()"
      >
        {{ getStatus(ticket.status) }}
      </span>

      <div class="ticket-meta-right">
        @if (ticket.dueDate) {
          <span class="ticket-due">{{ ticket.dueDate | date: "MMM d" }}</span>
        }

        @if (ticket.assignee) {
          <span class="ticket-assignee">
            <app-user-icon
              [userName]="ticket.assignee.name"
              size="small"
            ></app-user-icon>
          </span>
        }
      </div>
    </div>
  </div>
}
