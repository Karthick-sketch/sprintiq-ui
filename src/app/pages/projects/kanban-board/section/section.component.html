<section>
  <div class="border-solid border-2 border-gray-200">
    <h2 class="text-center">{{ section.name }}</h2>
    @for (ticket of section.tickets; track $index) {
      <app-section-ticket [ticket]="ticket"></app-section-ticket>
    }
    <button class="cursor-pointer" (click)="openTicketSlideInPanel()">
      Add Ticket
    </button>
  </div>
  <app-ticket-form
    [isSlideInPanelOpen]="isSlideInPanelOpen"
    (ticketSlideInPanel)="closeTicketSlideInPanel()"
    (ticketEvent)="addTicket($event)"
  ></app-ticket-form>
</section>
