<section class="border-solid border-2 border-gray-200">
  <h2 class="text-center">{{ section.name }}</h2>
  @for (ticket of section.tickets; track $index) {
    <app-section-ticket [ticket]="ticket"></app-section-ticket>
  }
  <button class="cursor-pointer" (click)="openTicketSlideInPanel()">
    Add Ticket
  </button>
</section>

@if (isSlideInPanelOpen) {
  <!-- Overlay -->
  <div
    class="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity"
    (click)="closeTicketSlideInPanel()"
  ></div>
}

<!-- Slide-in Panel -->
<div
  class="fixed inset-y-0 right-0 z-50 w-96 bg-white shadow-xl transform transition-transform duration-300 ease-in-out flex flex-col"
  [class.translate-x-0]="isSlideInPanelOpen"
  [class.translate-x-full]="!isSlideInPanelOpen"
>
  <!-- Header -->
  <div class="flex items-center justify-between p-4 border-b">
    <h2 class="text-xl font-semibold">Create New Ticket</h2>
    <button
      (click)="closeTicketSlideInPanel()"
      class="text-gray-500 hover:text-gray-700"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto p-4 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
      <input
        type="text"
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="Enter ticket title"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Description</label
      >
      <textarea
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        rows="4"
        placeholder="Enter ticket description"
      ></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
      <select
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
      >
        <option value="" disabled selected>Select status</option>
        <option value="todo">To Do</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Priority</label
      >
      <select
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
      >
        <option value="" disabled selected>Select priority</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Assignee</label
      >
      <input
        type="text"
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="Select assignee"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Project</label
      >
      <input
        type="text"
        class="w-full border border-gray-300 rounded-md p-2 text-black focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="Select project"
      />
    </div>
  </div>

  <!-- Footer -->
  <div class="p-4 border-t flex justify-end space-x-3">
    <button
      (click)="closeTicketSlideInPanel()"
      class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none"
    >
      Cancel
    </button>
    <button
      class="px-4 py-2 btn-primary-color text-white rounded-md hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
    >
      Create
    </button>
  </div>
</div>
