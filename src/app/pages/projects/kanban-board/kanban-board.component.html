<div class="flex gap-4">
  @for (section of sections; track $index) {
    <app-section [section]="section"></app-section>
  }
  @if (isAddSectionClicked) {
    <div>
      <input type="text" [(ngModel)]="newSection.name" />
      <button (click)="addSection()">Add Section</button>
      <button (click)="closeAddSection()">Cancel</button>
    </div>
  } @else {
    <div>
      <button class="cursor-pointer" (click)="enableAddSection()">
        Add Section
      </button>
    </div>
  }
</div>
