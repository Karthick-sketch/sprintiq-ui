<div cdkDropListGroup class="kanban-board">
  @for (section of sections; track $index) {
    <app-section
      [section]="section"
      [users]="users"
      [project]="project"
    ></app-section>
  }
  @if (isAddSectionClicked) {
    <div class="add-section-form">
      <input
        class="add-section-input"
        type="text"
        [(ngModel)]="newSection.name"
        placeholder="Section name…"
      />
      <div class="add-section-actions">
        <button class="btn-add-confirm" (click)="addSection()">Add</button>
        <button class="btn-add-cancel" (click)="closeAddSection()">
          Cancel
        </button>
      </div>
    </div>
  } @else {
    <div class="add-section-trigger">
      <button class="btn-add-section" (click)="enableAddSection()">
        <span class="add-section-icon">+</span>
        Add Section
      </button>
    </div>
  }
</div>
