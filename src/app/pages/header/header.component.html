<header class="flex justify-between items-center">
  <div class="flex items-center bg-slate-200/50 rounded-full px-4 py-1.5 w-72">
    <app-icon
      url="/header/search.svg"
      size="w-4 h-4"
      [isActive]="isSearchFocused"
      activeClasses="bg-gray-700"
      inactiveClasses="bg-gray-500"
    ></app-icon>
    <input
      type="text"
      (focus)="onSearchFocus()"
      (blur)="onSearchBlur()"
      class="bg-transparent border-none outline-none text-sm text-gray-700 placeholder-gray-500 w-full"
      placeholder="Quick search..."
    />
  </div>
  <div class="flex items-center gap-4">
    <div class="relative cursor-pointer">
      <app-icon
        url="/header/notification.svg"
        size="w-5 h-5"
        inactiveClasses="bg-gray-800"
      ></app-icon>
      <div class="absolute top-0 right-1 w-2 h-2 rounded-full bg-red-500"></div>
    </div>
    <div class="w-8 h-8 rounded-full overflow-hidden cursor-pointer">
      <img
        class="w-full h-full object-cover"
        src="/header/user.png"
        alt="user profile"
      />
    </div>
  </div>
</header>
