<div class="flex flex-col gap-6">
  <section>
    <h2 class="text-2xl font-bold">Hello, Alex!</h2>
    <p class="text-gray-500">
      Here's what's happening with your projects today.
    </p>
  </section>
  <section class="flex justify-between">
    <app-dashboard-card
      [value]="metrics.projects"
      label="Active Projects"
      icon="/left-navigation-bar/projects.svg"
      color="primary-color"
      bgColor="primary-bg-color"
    ></app-dashboard-card>
    <app-dashboard-card
      [value]="metrics.tickets"
      label="Pending Tickets"
      icon="/dashboard/pending-task.svg"
      color="pending-task-color"
      bgColor="pending-task-bg-color"
    ></app-dashboard-card>
    <app-dashboard-card
      [value]="metrics.completed"
      label="Completed Tickets"
      icon="/dashboard/complete.svg"
      color="completed-task-color"
      bgColor="completed-task-bg-color"
    ></app-dashboard-card>
  </section>
</div>
