<section class="recent-activity-container">
  <div class="flex justify-between">
    <h2 class="text-xl font-semibold">Recent Activity</h2>
    <button class="primary-color font-semibold underline cursor-pointer">
      View All
    </button>
  </div>
  <div class="flex flex-col gap-2 mt-3">
    @for (activity of recentActivity; track $index) {
      <div class="flex gap-2 p-2 hover:bg-slate-100 rounded-lg cursor-pointer">
        <div class="w-8 h-8 rounded-full overflow-hidden cursor-pointer">
          <img
            class="w-full h-full object-cover"
            [src]="activity.icon"
            alt="user profile"
          />
        </div>
        <div>
          <p>
            <span class="font-bold">{{ activity.userName }}</span>
            {{ activity.description }}
          </p>
          <p class="text-xs text-slate-400 mt-1 font-semibold">
            {{ activity.time }} ago • {{ activity.team }}
          </p>
        </div>
      </div>
    }
  </div>
</section>
