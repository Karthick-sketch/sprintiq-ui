<div class="card-container w-100">
  <div class="w-10 rounded-2xl p-2" [class]="bgColor">
    <app-icon
      [url]="icon"
      [size]="'w-6 h-6'"
      [inactiveClasses]="color"
    ></app-icon>
  </div>
  <div class="flex flex-col">
    <h3 class="text-2xl font-bold">{{ value }}</h3>
    <p class="text-gray-500">{{ label }}</p>
  </div>
</div>
