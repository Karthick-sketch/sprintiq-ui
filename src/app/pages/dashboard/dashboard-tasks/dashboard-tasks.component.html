<section class="tasks-container">
  <div class="flex justify-between">
    <h2 class="text-xl font-semibold">My Tasks</h2>
    <button class="primary-color font-semibold underline cursor-pointer">
      View All
    </button>
  </div>
  <div class="flex flex-col gap-2 mt-3">
    @for (task of tasks; track $index) {
      <div
        class="flex flex-col gap-2 p-2 hover:bg-slate-100 rounded-lg cursor-pointer"
      >
        <p
          class="text-white text-xs font-semibold w-fit px-2 py-1 rounded-full"
          [class]="getPriorityColor(task.priority)"
        >
          {{ task.priority }}
        </p>
        <p class="font-semibold">{{ task.title }}</p>
        <div class="flex items-center">
          <app-icon
            url="/dashboard/clock.svg"
            size="w-3 h-3"
            inactiveClasses="text-slate-400"
          ></app-icon>
          <p class="text-sm text-slate-400 font-semibold">
            {{ task.dueDate }}
          </p>
        </div>
      </div>
    }
  </div>
</section>
