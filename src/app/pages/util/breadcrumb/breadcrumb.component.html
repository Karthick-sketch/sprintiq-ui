<div class="flex items-center gap-2 font-semibold">
  @for (breadcrumb of breadcrumbRoutes; track $index) {
    @if (breadcrumb.route) {
      <span
        class="cursor-pointer primary-color hover:underline"
        (click)="navigate(breadcrumb.route)"
      >
        {{ breadcrumb.label }}
      </span>

      <span class="text-gray-400">/</span>
    } @else {
      <span class="text-gray-800">{{ breadcrumb.label }}</span>
    }
  }
</div>
